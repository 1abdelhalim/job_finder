# Daily scrape → match → digest email (no Ollama). Requires repository secrets — see comments below.
# Secrets: PROFILE_YAML (full profile.yaml), GMAIL_USER, GMAIL_APP_PASSWORD; optional LIFE_STORY_MD.
# If there are no new jobs above digest_min_score, you still get a short "no new high-match listings" email
# when DIGEST_NOTIFY_ON_EMPTY=1 (so a silent run is not mistaken for a broken workflow).
name: Daily job digest

on:
  schedule:
    # Every calendar day at 09:00 UTC (GitHub Actions cron is UTC; 5 fields: min hour dom mon dow).
    # Scheduled workflows run from the default branch only. Use workflow_dispatch to run manually anytime.
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-jobs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      FORCE_DIGEST: "1"
      DIGEST_NOTIFY_ON_EMPTY: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache Hugging Face hub
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            hf-${{ runner.os }}-

      - name: Cache SQLite jobs database
        uses: actions/cache@v4
        with:
          path: jobs.db
          key: jobs-db-${{ runner.os }}-${{ hashFiles('requirements.txt') }}-v1
          restore-keys: |
            jobs-db-${{ runner.os }}-

      # Required secrets: PROFILE_YAML (full file). LIFE_STORY_MD optional but recommended.
      # GMAIL_USER + GMAIL_APP_PASSWORD for SMTP (same as local .env).
      - name: Write profile and life story from secrets
        env:
          PROFILE_YAML: ${{ secrets.PROFILE_YAML }}
          LIFE_STORY_MD: ${{ secrets.LIFE_STORY_MD }}
        run: |
          if [ -z "$PROFILE_YAML" ]; then
            echo "::error::Add repository secret PROFILE_YAML (contents of profile.yaml)"
            exit 1
          fi
          printf '%s\n' "$PROFILE_YAML" > profile.yaml
          if [ -n "$LIFE_STORY_MD" ]; then
            printf '%s\n' "$LIFE_STORY_MD" > life-story.md
          else
            echo "# (empty — set LIFE_STORY_MD secret for better matching)" > life-story.md
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python main.py pipeline --skip-applications --force-digest

      - name: Job summary
        if: success()
        run: |
          python3 << 'PY' >> "$GITHUB_STEP_SUMMARY"
          import os
          import sqlite3
          print("## Daily job digest")
          print("")
          if not os.path.isfile("jobs.db"):
              print("_No jobs.db in workspace (pipeline may have failed early)._")
          else:
              conn = sqlite3.connect("jobs.db")
              row = conn.execute(
                  """SELECT jobs_scraped, emails_sent, status,
                            substr(log, 1, 2000) AS log_snip
                     FROM pipeline_runs ORDER BY id DESC LIMIT 1"""
              ).fetchone()
              conn.close()
              if not row:
                  print("_No pipeline_runs row (unexpected)._")
              else:
                  js, em, st, snip = row
                  print("| Field | Value |")
                  print("| --- | --- |")
                  print(f"| jobs_scraped | {js} |")
                  print(f"| emails_sent | {em} |")
                  print(f"| status | {st} |")
                  print("")
                  print("<details><summary>Log excerpt</summary>")
                  print("")
                  print("```")
                  print((snip or "").replace("```", "``\\`"))
                  print("```")
                  print("</details>")
          PY
